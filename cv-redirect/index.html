<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>virtú | Redirecionando…</title>
<!-- Fallback sem JS: redireciona em 5s mesmo se o script não rodar -->
<meta http-equiv="refresh" content="5;url=https://brio.cvcrm.com.br/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@1,500;1,600&family=Sora:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { background: #1E3D34; font-family: 'Sora', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  @keyframes floatGlowA { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(6%, -8%) scale(1.15); } }
  @keyframes floatGlowB { 0%,100% { transform: translate(0,0) scale(1.1); } 50% { transform: translate(-7%, 6%) scale(0.92); } }
  @keyframes riseIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes barWipe { from { left: -40%; } to { left: 140%; } }
  @media (prefers-reduced-motion: reduce) {
    .glow { animation: none !important; }
    .rise { opacity: 1 !important; transform: none !important; animation: none !important; }
  }
  .wrap {
    position: relative; width: 100%; min-height: 100vh; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(95% 85% at 12% 6%, rgba(52,137,129,0.34), transparent 56%),
      radial-gradient(90% 90% at 92% 98%, rgba(193,167,132,0.16), transparent 60%),
      linear-gradient(150deg, #265249 0%, #1E3D34 46%, #15302a 100%);
  }
  .glow-a {
    position: absolute; top: -18%; left: 8%; width: 46vw; height: 46vw; max-width: 720px; max-height: 720px;
    border-radius: 50%; background: radial-gradient(circle, rgba(193,167,132,0.26), rgba(193,167,132,0) 68%);
    filter: blur(8px); animation: floatGlowA 14s ease-in-out infinite; pointer-events: none;
  }
  .glow-b {
    position: absolute; bottom: -24%; right: -4%; width: 56vw; height: 56vw; max-width: 840px; max-height: 840px;
    border-radius: 50%; background: radial-gradient(circle, rgba(52,137,129,0.5), rgba(52,137,129,0) 64%);
    filter: blur(8px); animation: floatGlowB 17s ease-in-out infinite; pointer-events: none;
  }
  .vignette { position: absolute; inset: 0; background: radial-gradient(140% 100% at 50% 120%, rgba(0,0,0,0.55), transparent 60%); pointer-events: none; }
  main { position: relative; z-index: 2; width: 100%; max-width: 720px; padding: 48px 28px; display: flex; flex-direction: column; align-items: center; text-align: center; }
  .badge {
    opacity: 0; animation: riseIn 0.6s cubic-bezier(.2,.7,.2,1) 0.05s forwards;
    display: inline-flex; align-items: center; gap: 9px; padding: 8px 16px;
    border: 1px solid rgba(193,167,132,0.45); border-radius: 999px; margin-bottom: 46px;
  }
  .badge-dot { width: 7px; height: 7px; border-radius: 50%; background: #348981; box-shadow: 0 0 12px #348981; }
  .badge-label { font-size: 12.5px; letter-spacing: 0.32em; font-weight: 600; color: #FFFFFF; text-transform: uppercase; white-space: nowrap; }
  .logo-wrap { opacity: 0; animation: riseIn 0.7s cubic-bezier(.2,.7,.2,1) 0.18s forwards; display: flex; align-items: center; justify-content: center; margin-bottom: 40px; }
  .logo-text { font-family: 'Sora', sans-serif; font-weight: 300; font-size: 42px; letter-spacing: 0.01em; color: #FFFFFF; text-transform: lowercase; }
  .logo-text span { color: #C1A784; font-style: italic; font-family: 'Newsreader', serif; font-weight: 500; }
  h1 {
    opacity: 0; animation: riseIn 0.7s cubic-bezier(.2,.7,.2,1) 0.3s forwards;
    font-weight: 200; font-size: clamp(30px, 6vw, 52px); line-height: 1.08; color: #FFFFFF;
    letter-spacing: -0.01em; max-width: 16ch;
  }
  h1 em { font-family: 'Newsreader', serif; font-style: italic; font-weight: 500; }
  .pill {
    opacity: 0; animation: riseIn 0.7s cubic-bezier(.2,.7,.2,1) 0.42s forwards;
    margin-top: 26px; display: inline-flex; align-items: center; gap: 10px; padding: 9px 18px;
    border: 1px solid rgba(193,167,132,0.4); border-radius: 999px;
  }
  .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: #C1A784; }
  .pill span { font-size: 14px; font-weight: 300; color: rgba(255,255,255,0.82); letter-spacing: 0.005em; white-space: nowrap; }
  .pill strong { font-weight: 600; color: #C1A784; }
  p.sub {
    opacity: 0; animation: riseIn 0.7s cubic-bezier(.2,.7,.2,1) 0.5s forwards;
    margin-top: 22px; font-weight: 300; font-size: clamp(15px, 2.4vw, 18px); line-height: 1.6;
    color: rgba(255,255,255,0.72); max-width: 40ch;
  }
  p.sub b { color: #C1A784; font-weight: 500; }
  .actions { opacity: 0; animation: riseIn 0.7s cubic-bezier(.2,.7,.2,1) 0.56s forwards; margin-top: 50px; display: flex; flex-direction: column; align-items: center; gap: 26px; width: 100%; }
  .timer-row { display: inline-flex; align-items: center; gap: 14px; color: rgba(255,255,255,0.65); font-size: 14px; font-weight: 400; }
  .ring-wrap { position: relative; display: inline-grid; place-items: center; width: 52px; height: 52px; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-num { position: absolute; font-size: 18px; font-weight: 600; color: #FFFFFF; }
  #ring-progress { transition: stroke-dashoffset 1s linear; }
  .go-btn {
    cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 11px;
    padding: 16px 30px; border-radius: 999px; background: #348981; color: #FFFFFF;
    font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 600; letter-spacing: 0.005em;
    box-shadow: 0 14px 40px rgba(52,137,129,0.42);
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    text-decoration: none;
  }
  .go-btn:hover { background: #3fa298; transform: translateY(-2px); box-shadow: 0 18px 48px rgba(52,137,129,0.58); }
  .go-btn:active { transform: translateY(0); }
  .go-arrow { font-size: 18px; line-height: 1; }
  .progress-track { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.1); z-index: 3; overflow: hidden; }
  .progress-bar { position: absolute; top: 0; bottom: 0; width: 40%; background: linear-gradient(to right, transparent, #C1A784, #348981, transparent); animation: barWipe 2.4s ease-in-out infinite; }
</style>
</head>
<body>
<div class="wrap">
  <div class="glow glow-a"></div>
  <div class="glow glow-b"></div>
  <div class="vignette"></div>

  <main>
    <div class="badge rise">
      <span class="badge-dot"></span>
      <span class="badge-label">Parceria Oficial</span>
    </div>

    <div class="logo-wrap rise">
      <div class="logo-text">vir<span>t</span>ú</div>
    </div>

    <h1 class="rise">O seu futuro é o<br>nosso <em>propósito</em>.</h1>

    <div class="pill rise">
      <span class="pill-dot"></span>
      <span>Sistema compartilhado com a <strong>brio Incorporadora</strong></span>
    </div>

    <p class="sub rise">
      Estamos te levando ao <b>brio.cvcrm.com.br</b> — do projeto à entrega, a virtú com você.
    </p>

    <div class="actions rise">
      <div class="timer-row">
        <span class="ring-wrap">
          <svg width="52" height="52" viewBox="0 0 52 52">
            <circle cx="26" cy="26" r="23" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="3"></circle>
            <circle id="ring-progress" cx="26" cy="26" r="23" fill="none" stroke="#348981" stroke-width="3"
                    stroke-linecap="round" stroke-dasharray="144.5" stroke-dashoffset="0"></circle>
          </svg>
          <span class="ring-num" id="ring-num">5</span>
        </span>
        <span>Redirecionando automaticamente…</span>
      </div>

      <a class="go-btn" id="go-now" href="https://brio.cvcrm.com.br/">
        Ir para o brio.cvcrm.com.br agora
        <span class="go-arrow">→</span>
      </a>
    </div>
  </main>

  <div class="progress-track">
    <div class="progress-bar glow"></div>
  </div>
</div>

<script>
(function () {
  var DEST = 'https://brio.cvcrm.com.br/';
  var TOTAL = 5;
  var remaining = TOTAL;
  var ring = document.getElementById('ring-progress');
  var numEl = document.getElementById('ring-num');
  var circ = 2 * Math.PI * 23;
  ring.setAttribute('stroke-dasharray', circ.toFixed(1));

  function paint() {
    numEl.textContent = remaining;
    var frac = remaining / TOTAL;
    ring.setAttribute('stroke-dashoffset', (circ * (1 - frac)).toFixed(1));
  }
  paint();

  var timer = setInterval(function () {
    remaining -= 1;
    if (remaining <= 0) {
      clearInterval(timer);
      numEl.textContent = '0';
      ring.setAttribute('stroke-dashoffset', '0');
      // Só navega automaticamente se a página estiver rodando sozinha
      // (não dentro de um iframe de preview/editor).
      if (window.top === window.self) {
        window.location.href = DEST;
      }
      return;
    }
    paint();
  }, 1000);

  document.getElementById('go-now').addEventListener('click', function () {
    clearInterval(timer);
  });
})();
</script>
</body>
</html>
